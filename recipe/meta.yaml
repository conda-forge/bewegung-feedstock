{% set name = "bewegung" %}
{% set version = "0.0.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/bewegung-{{ version }}.tar.gz
  sha256: 137c6f2df36568dcd5ce55b289ad5ff7102e0d14632d9731fb1e1f6f622dffc4

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - datashader
    - ffmpeg
    - ipython
    - matplotlib-base
    - librsvg
    - numba
    - numpy
    - pango
    - pillow
    - pycairo
    - pygobject
    - python >={{ python_min }}
    - tqdm
    - typeguard

test:
  imports:
    - bewegung
    - bewegung.drawingboard
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/pleiszenburg/bewegung
  summary: a versatile video renderer
  license: LGPL-2.1-or-later
  license_file: LICENSE
  doc_url: https://bewegung.readthedocs.io/
  dev_url: https://github.com/pleiszenburg/bewegung

extra:
  recipe-maintainers:
    - s-m-e
